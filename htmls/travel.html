<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UberX SpaceX Space Rides</title>
    <link rel="stylesheet" href="/csss/app.css">
    <link rel="icon" href="img/logotipo.png">
</head>

<body class="fondoestrellas">
    <div class="loader">
        <img src="../img/loading.jpeg" alt="Pantalla de carga">
    </div>
    <!-- boton para devolverse-->
    <div>
        <a href="/htmls/home.html">
            <p class="atras">></p>
        </a>
    </div>

    <!-- muestra de planetas y ruta espacial-->
    <div class="viajerr">
        <section class="travel-map" aria-label="Ruta de viaje de la Tierra a Marte">
            <svg class="orbit-line" viewBox="0 0 720 420" aria-hidden="true">
                <path d="M165 315 C235 120 420 65 575 112" />
            </svg>

            <label for="abrirMenu" class="planet-stop earth-stop">
                <img src="../img/tierra.png" class="planet-img earth-img" alt="Planeta Tierra">
                <span class="planet-label earth-label">Earth <b>&gt;</b></span>
            </label>

            <label for="abrirMenu" class="planet-stop mars-stop">
                <img src="../img/ruedamarte.png" class="planet-img mars-img" alt="Planeta Marte">
                <span class="planet-label mars-label">Mars <b>&gt;</b></span>
            </label>
        </section>
    </div>
    <!--desplegable-->
    <input type="radio" name="menu" id="lista" checked hidden>
    <input type="radio" name="menu" id="detalle" hidden>
    <input type="checkbox" id="abrirMenu" hidden>
    <div class="menu">
        <label for="abrirMenu" class="btmenu">--------</label>
        <div class="contentmenu">
            <div class="menu1">
                <p>Las tarifas son más altas debido a los desechos espaciales</p>
                <label for="detalle" class="item">
                    <h2>Crew Dragon</h2>
                    <p>48.5$</p>
                </label>
                <div class="item">
                    <h2>Starliner</h2>
                    <p>51.2$ </p>
                </div>

                <div class="item">
                    <h2>Dream Chaser</h2>
                    <p>102.5$</p>
                </div>
            </div>
            <div class="menu2">
                <img src="../img/CrewDragon.png" class="naves">
                <h2>Starliner</h2>
                <p>Next Launch: 12/03/2026</p>
                <p class="wallet">💳 Conecta tu wallet</p>
                <a href="/htmls/payment-methods.html">
                    <p class="pagar">💸 Pago</p>
                </a>
                <label for="lista" class="volver">← Volver</label>
            </div>
        </div>
    </div>
</body>
